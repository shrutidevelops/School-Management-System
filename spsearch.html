<style>
body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: #e9ecef;
    margin: 0;
    padding: 30px;
}

/* Table container */
table {
    border-collapse: collapse;
    width: 95%;
    max-width: 950px;
    margin: auto;
    background: #ffffff;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}

/* Table rows */
td {
    padding: 18px;
    border-bottom: 1px solid #eee;
    transition: 0.3s;
}

/* Row hover effect */
tr:hover td {
    background: #f5f9ff;
    transform: scale(1.01);
}

/* Form layout */
form {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 12px;
}

/* Section title */
form strong {
    flex-basis: 100%;
    font-size: 16px;
    color: #2c3e50;
}

/* Inputs */
select,
input[type="text"] {
    flex: 1;
    min-width: 160px;
    padding: 10px;
    border: 1px solid #bbb;
    border-radius: 6px;
    outline: none;
}

/* Focus effect */
select:focus,
input[type="text"]:focus {
    border-color: #2980b9;
    box-shadow: 0 0 6px rgba(41,128,185,0.4);
}

/* Button */
input[type="submit"] {
    padding: 10px 18px;
    background: linear-gradient(45deg, #2980b9, #1f6391);
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

/* Hover */
input[type="submit"]:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

/* Remove last border */
tr:last-child td {
    border-bottom: none;
}
</style>

</head>
